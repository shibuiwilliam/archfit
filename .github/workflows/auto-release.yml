name: auto-release

# Automatically bump patch version, tag, build, and release on every push to main.
# For minor/major bumps, manually edit VERSION before merging to main.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".claude/**"
      - "LICENSE"

permissions:
  contents: write
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --- Determine the next version ---
  version:
    name: version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      is_new: ${{ steps.resolve.outputs.is_new }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        run: |
          # Read the base version from VERSION file.
          BASE=$(cat VERSION | tr -d '[:space:]')
          if [ -z "$BASE" ]; then
            echo "::error::VERSION file is empty"
            exit 1
          fi

          # Parse major.minor.patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"

          # Find the latest tag matching this major.minor prefix.
          LATEST_TAG=$(git tag -l "v${MAJOR}.${MINOR}.*" --sort=-v:refname | head -1)

          if [ -z "$LATEST_TAG" ]; then
            # No tags for this major.minor yet — use VERSION as-is.
            NEXT="${MAJOR}.${MINOR}.${PATCH}"
          else
            # Extract the patch from the latest tag and bump it.
            LATEST_PATCH=$(echo "$LATEST_TAG" | sed "s/v${MAJOR}\.${MINOR}\.\(.*\)/\1/")
            NEXT_PATCH=$((LATEST_PATCH + 1))
            # If VERSION file patch is higher (manual bump), use that instead.
            if [ "$PATCH" -gt "$NEXT_PATCH" ]; then
              NEXT_PATCH=$PATCH
            fi
            NEXT="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          fi

          TAG="v${NEXT}"

          # Check if this tag already exists (idempotency guard).
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping release."
            echo "is_new=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_new=true" >> "$GITHUB_OUTPUT"
          fi

          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${NEXT} (tag: ${TAG})"

  # --- Lint + test gate (must pass before release) ---
  gate:
    name: gate
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.is_new == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: make lint
      - run: make test
      - run: make self-scan

  # --- Tag the commit ---
  tag:
    name: tag
    runs-on: ubuntu-latest
    needs: [version, gate]
    if: needs.version.outputs.is_new == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG (auto)"
          git push origin "$TAG"

  # --- Build cross-platform binaries ---
  binaries:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [version, tag]
    if: needs.version.outputs.is_new == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, suffix: "" }
          - { goos: linux,   goarch: arm64, suffix: "" }
          - { goos: darwin,  goarch: amd64, suffix: "" }
          - { goos: darwin,  goarch: arm64, suffix: "" }
          - { goos: windows, goarch: amd64, suffix: ".exe" }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          BINARY="archfit-v${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          go build -trimpath \
            -ldflags "-s -w -X github.com/shibuiwilliam/archfit/internal/version.linkerVersion=${VERSION}" \
            -o "dist/${BINARY}" ./cmd/archfit

      - name: Create archive
        run: |
          cd dist
          BINARY=$(ls archfit-*)
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            zip "${BINARY%.exe}.zip" "${BINARY}"
          else
            tar czf "${BINARY}.tar.gz" "${BINARY}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/archfit-*.tar.gz
            dist/archfit-*.zip
          if-no-files-found: error

  # --- Run self-scan and archive the report ---
  self-scan:
    name: self-scan report
    runs-on: ubuntu-latest
    needs: [version, tag]
    if: needs.version.outputs.is_new == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build and scan
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          make build
          mkdir -p dist
          ./bin/archfit scan --json . > dist/archfit-self-scan-v${VERSION}.json

      - uses: actions/upload-artifact@v4
        with:
          name: self-scan-report
          path: dist/archfit-self-scan-*.json
          if-no-files-found: error

  # --- Create GitHub Release with all artifacts ---
  release:
    name: github-release
    runs-on: ubuntu-latest
    needs: [version, binaries, self-scan]
    if: needs.version.outputs.is_new == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum archfit-* > checksums-sha256.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          gh release create "$TAG" \
            --title "archfit $TAG" \
            --generate-notes \
            --notes-start-tag "$(git tag -l 'v*' --sort=-v:refname | sed -n '2p')" \
            dist/* \
            || gh release create "$TAG" \
              --title "archfit $TAG" \
              --generate-notes \
              dist/*

  # --- Build and push Docker image ---
  docker:
    name: docker (ghcr.io)
    runs-on: ubuntu-latest
    needs: [version, tag]
    if: needs.version.outputs.is_new == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.version.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.version.outputs.tag }}
            type=raw,value=latest
            type=sha,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Update VERSION file and record self-scan snapshot ---
  bump-version:
    name: bump VERSION + self-scan snapshot
    runs-on: ubuntu-latest
    needs: [version, release]
    if: needs.version.outputs.is_new == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Update VERSION and record self-scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Update VERSION.
          echo "$VERSION" > VERSION

          # Record self-scan snapshot.
          make build
          mkdir -p docs/self-scan
          ./bin/archfit scan --json . > "docs/self-scan/${VERSION}.json"

          git add VERSION "docs/self-scan/${VERSION}.json"
          git commit -m "chore: bump VERSION to ${VERSION}, record self-scan [skip ci]"

          # Try direct push first (works when main is unprotected).
          if git push origin main 2>/dev/null; then
            echo "Pushed VERSION update directly to main."
            exit 0
          fi

          # main is protected — create a PR instead.
          BRANCH="chore/bump-version-${VERSION}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: bump VERSION to ${VERSION}" \
            --body "Automated version bump after release v${VERSION}. Safe to merge — contains only the VERSION file update." \
            || echo "::warning::Could not create PR. Enable 'Allow GitHub Actions to create pull requests' in Settings > Actions > General."

          # Auto-merge if the repo allows it.
          gh pr merge "$BRANCH" --squash --auto --delete-branch 2>/dev/null \
            || echo "::notice::PR created but auto-merge not enabled — merge manually."
