# golangci-lint configuration.
# Keep this tight. Adding a linter is a design decision; surface it in the PR.
# Each disabled linter needs a reason comment.

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    # Correctness
    - govet         # core vet checks; catches printf/copylocks/etc.
    - staticcheck   # SA* / S* / ST* checks
    - ineffassign   # unused assignments
    - errcheck      # unchecked errors
    # Style / clarity
    - unconvert
    - misspell
    - revive        # replaces golint; configured below for archfit
    - gocritic
    # Import hygiene — goimports is in formatters.enable below (v2 classifies it as a formatter).
  settings:
    errcheck:
      # CLI diagnostic output to stdout/stderr. Checking these return values
      # is universally omitted in Go CLIs — the write target is a pipe/tty
      # and there is no meaningful recovery on failure.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
        - name: unexported-return
        - name: var-declaration
    gocritic:
      enabled-tags: [diagnostic, style, performance]
      disabled-checks:
        # commentFormatting fires on godoc links; not worth the noise.
        - commentFormatting
      settings:
        # model.Rule is 256 bytes, core.ScanResult 184 bytes, config.Config
        # 136 bytes. These are passed by value because: (a) the Client
        # interface mandates value receivers, and (b) callers don't intend
        # to mutate. 300 covers all current types without hiding genuinely
        # wasteful copies of larger aggregates.
        hugeParam:
          sizeThreshold: 300
        rangeValCopy:
          sizeThreshold: 300

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true

issues:
  # Maximum issues per linter; 0 = unlimited. Keep honest.
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Test files may leave receivers unused.
    - path: _test\.go
      linters: [revive]
      text: "unused-parameter"
